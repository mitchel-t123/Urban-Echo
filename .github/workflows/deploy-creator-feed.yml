name: Deploy Creator Feed

on:
  push:
    branches: [main, claude/ad-free-creator-feed-jltmzu]
    paths:
      - 'creator-feed/**'
      - '.github/workflows/deploy-creator-feed.yml'
  schedule:
    - cron: '0 */6 * * *'   # rebuild every 6 hours for fresh videos
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: creator-feed/package-lock.json

      - name: Install dependencies
        working-directory: creator-feed
        run: npm ci

      - name: Build static site
        working-directory: creator-feed
        env:
          BASE_PATH: /Urban-Echo
        run: npm run build

      - name: Add .nojekyll
        run: touch creator-feed/out/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: creator-feed/out
          publish_branch: gh-pages
          force_orphan: true
