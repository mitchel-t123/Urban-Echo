<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Login — Urban Echo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream: #FBF5E7;
  --indigo: #3F3FF0;
  --ink: #161527;
  --paper: #FFFCF5;
  --orange: #F4612E;
  --display: 'Archivo Black', 'Arial Black', sans-serif;
  --body: 'Inter', -apple-system, sans-serif;
  --mono: 'Space Mono', monospace;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html{ background: var(--ink); }
body{
  font-family: var(--body);
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.login-wrap{
  width: 100%;
  max-width: 440px;
}
.login-header{
  width: 100%;
  background: var(--paper);
  color: var(--ink);
  border-radius: 24px 24px 0 0;
  border: 2.5px solid var(--ink);
  border-bottom: none;
  box-shadow: 8px 8px 0 rgba(255,252,245,0.15);
  padding: 32px 36px 24px;
}
.login-logo{ display:block; height:26px; margin-bottom:24px; }
.login-eyebrow{
  font-family: var(--mono); font-size:12px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.12em;
  color: var(--orange); display:block; margin-bottom:6px;
}
.login-header h1{
  font-family: var(--display); font-size:26px; font-weight:700;
  line-height:1.05; text-transform:uppercase; letter-spacing:-0.01em;
}
.login-body{
  background: var(--paper);
  color: var(--ink);
  border-radius: 0 0 24px 24px;
  border: 2.5px solid var(--ink);
  border-top: none;
  box-shadow: 8px 8px 0 rgba(255,252,245,0.15);
  padding: 0 0 8px;
  min-height: 80px;
}
.login-loading{
  padding: 40px 36px;
  text-align: center;
  font-family: var(--mono); font-size:13px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.1em;
  color: rgba(22,21,39,0.35);
}
/* Blend Clerk's card into our design */
#clerk-sign-in .cl-rootBox{ width:100% !important; }
#clerk-sign-in .cl-card{
  background: transparent !important;
  box-shadow: none !important;
  border: none !important;
  border-radius: 0 !important;
  padding: 12px 28px 28px !important;
}
#clerk-sign-in .cl-headerTitle,
#clerk-sign-in .cl-headerSubtitle,
#clerk-sign-in .cl-header{ display:none !important; }
#clerk-sign-in .cl-dividerLine{ background: rgba(22,21,39,0.15) !important; }
#clerk-sign-in .cl-formButtonPrimary{
  background: var(--ink) !important;
  font-family: var(--mono) !important;
  font-size: 13px !important;
  font-weight: 700 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.08em !important;
  border-radius: 10px !important;
  box-shadow: none !important;
}
.login-note{
  margin-top: 20px; font-family:var(--mono); font-size:11.5px;
  color:rgba(255,252,245,0.45); text-align:center; line-height:1.6;
}
.back-link{
  display:block; margin-top:20px; text-align:center;
  font-family:var(--mono); font-size:12px;
  color:rgba(255,252,245,0.45); text-decoration:none;
}
.back-link:hover{ color:var(--paper); }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-header">
    <img src="logo.png" alt="Urban Echo" class="login-logo">
    <span class="login-eyebrow">Employee Access</span>
    <h1>Team Portal</h1>
  </div>
  <div class="login-body">
    <div id="clerk-loading" class="login-loading">Loading…</div>
    <div id="clerk-sign-in"></div>
  </div>
</div>

<p class="login-note">Access is by invitation only.<br>Contact Mitchel if you need an account.</p>
<a href="index.html" class="back-link">← Back to main site</a>

<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_live_Y2xlcmsudXJiYW5lY2hvLmNvbS5hdSQ"
  src="https://clerk.urbanecho.com.au/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
></script>
<script>
(async function(){
  var loadingEl = document.getElementById('clerk-loading');
  var signInEl  = document.getElementById('clerk-sign-in');

  // Wait for Clerk to auto-init via data-clerk-publishable-key
  await new Promise(function(resolve){
    function check(){ if(window.Clerk){ resolve(); } else { setTimeout(check, 50); } }
    check();
  });

  var clerk = window.Clerk;

  await Promise.race([
    clerk.load(),
    new Promise(function(resolve){ setTimeout(resolve, 4000); })
  ]);

  if(clerk.user){ window.location.replace('portal.html'); return; }

  // Poll every 500ms — redirect as soon as a session exists
  var poll = setInterval(function(){
    if(window.Clerk && window.Clerk.session){
      clearInterval(poll);
      window.location.href = 'https://urbanecho.com.au/portal.html';
    }
  }, 500);

  loadingEl.style.display = 'none';

  clerk.mountSignIn(signInEl, {
    appearance: {
      variables: {
        colorPrimary: '#3F3FF0',
        colorText: '#161527',
        colorBackground: '#FFFCF5',
        colorInputBackground: '#FBF5E7',
        colorInputText: '#161527',
        borderRadius: '10px',
        fontFamily: 'Inter, -apple-system, sans-serif',
      }
    }
  });
})();
</script>
</body>
</html>
