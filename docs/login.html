<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Login — Urban Echo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream: #FBF5E7;
  --indigo: #3F3FF0;
  --ink: #161527;
  --paper: #FFFCF5;
  --orange: #F4612E;
  --display: 'Archivo Black', 'Arial Black', sans-serif;
  --body: 'Inter', -apple-system, sans-serif;
  --mono: 'Space Mono', monospace;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html{ background: var(--ink); }
body{
  font-family: var(--body);
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.login-wrap{
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.login-header{
  width: 100%;
  background: var(--paper);
  color: var(--ink);
  border-radius: 24px 24px 0 0;
  border: 2.5px solid var(--ink);
  border-bottom: none;
  box-shadow: 8px 8px 0 rgba(255,252,245,0.15);
  padding: 32px 36px 24px;
}
.login-logo{
  display: block;
  height: 26px;
  margin-bottom: 24px;
}
.login-eyebrow{
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--orange);
  display: block;
  margin-bottom: 6px;
}
.login-header h1{
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  line-height: 1.05;
  text-transform: uppercase;
  letter-spacing: -0.01em;
}

/* Clerk component wrapper */
#clerk-sign-in{
  width: 100%;
}
/* Override Clerk card to blend with our design */
#clerk-sign-in .cl-card{
  border-radius: 0 0 24px 24px !important;
  border: 2.5px solid var(--ink) !important;
  border-top: none !important;
  box-shadow: 8px 8px 0 rgba(255,252,245,0.15) !important;
  background: var(--paper) !important;
  padding: 0 36px 32px !important;
}
#clerk-sign-in .cl-headerTitle,
#clerk-sign-in .cl-headerSubtitle{ display: none !important; }
#clerk-sign-in .cl-rootBox{ width: 100% !important; }

.login-note{
  margin-top: 20px;
  font-family: var(--mono);
  font-size: 11.5px;
  color: rgba(255,252,245,0.45);
  text-align: center;
  line-height: 1.6;
}
.back-link{
  display: block;
  margin-top: 20px;
  text-align: center;
  font-family: var(--mono);
  font-size: 12px;
  color: rgba(255,252,245,0.45);
  text-decoration: none;
}
.back-link:hover{ color: var(--paper); }

/* Loading state */
.login-loading{
  width: 100%;
  background: var(--paper);
  color: var(--ink);
  border-radius: 0 0 24px 24px;
  border: 2.5px solid var(--ink);
  border-top: none;
  padding: 40px 36px;
  text-align: center;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(22,21,39,0.4);
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-header">
    <img src="logo.png" alt="Urban Echo" class="login-logo">
    <span class="login-eyebrow">Employee Access</span>
    <h1>Team Portal</h1>
  </div>

  <!-- Fallback: direct link to Clerk's hosted sign-in page -->
  <div style="background:var(--paper);color:var(--ink);border-radius:0 0 24px 24px;border:2.5px solid var(--ink);border-top:none;box-shadow:8px 8px 0 rgba(255,252,245,0.15);padding:28px 36px 32px;">
    <a href="https://accounts.exciting-wahoo-99.clerk.accounts.dev/sign-in?redirect_url=https%3A%2F%2Furbanecho.com.au%2Fportal.html"
       style="display:block;width:100%;padding:14px;background:var(--ink);color:var(--paper);border:none;border-radius:10px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;text-decoration:none;text-align:center;">
      Log in →
    </a>
    <p style="margin-top:14px;font-family:'Space Mono',monospace;font-size:11px;color:rgba(22,21,39,0.4);text-align:center;line-height:1.6;">
      You'll be taken to a secure sign-in page<br>and returned here after.
    </p>
  </div>
</div>

<p class="login-note">Access is by invitation only.<br>Contact Mitchel if you need an account.</p>
<a href="index.html" class="back-link">← Back to main site</a>
</body>
</html>
